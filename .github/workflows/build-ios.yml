name: Build AniDaku IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-14

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node setup ─────────────────────────────────────────
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── 3. Ruby / Bundler (for CocoaPods) ─────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # ── 4. Install JS dependencies ──────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── 5. GENERATE iOS project (RN 0.73.6 compatible) ─────────
      - name: Generate iOS project files
        run: |
          if [ ! -d "ios/anidaku.xcodeproj" ]; then
            echo "⚠️  No .xcodeproj found. Generating iOS project..."
            
            npx @react-native-community/cli@12.3.6 init AnidakuTemp --version 0.73.6 --directory temp_ios --skip-install
            
            cp -R temp_ios/ios/* ios/
            rm -rf temp_ios
            
            mv "ios/AnidakuTemp.xcodeproj" "ios/anidaku.xcodeproj" 2>/dev/null || true
            mv "ios/AnidakuTemp.xcworkspace" "ios/anidaku.xcworkspace" 2>/dev/null || true
            
            echo "✅ iOS project generated"
          fi
          
          echo "📁 iOS directory contents:"
          ls -la ios/

      # ── 6. Install CocoaPods (with retry) ───────────────────────
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd ios
          
          for i in 1 2 3; do
            echo "Attempt $i: pod install..."
            if pod install --repo-update; then
              echo "✅ pod install succeeded"
              break
            else
              echo "❌ Attempt $i failed, waiting 30s before retry..."
              sleep 30
            fi
          done
        shell: bash

      # ── 7. Build archive (unsigned) ───────────────────────────
      # NOTE: Use AnidakuTemp scheme (has archive action configured)
      - name: Build iOS archive
        run: |
          gem install xcpretty 2>/dev/null || true
          
          xcodebuild \
            -workspace ios/anidaku.xcworkspace \
            -scheme AnidakuTemp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/anidaku.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      # ── 8. Export unsigned IPA ─────────────────────────────────
      - name: Export unsigned IPA
        run: |
          mkdir -p $RUNNER_TEMP/ipa
          APP_PATH=$(find $RUNNER_TEMP/anidaku.xcarchive -name "*.app" | head -1)
          mkdir -p $RUNNER_TEMP/ipa/Payload
          cp -r "$APP_PATH" $RUNNER_TEMP/ipa/Payload/
          cd $RUNNER_TEMP/ipa
          zip -r anidaku.ipa Payload/
          echo "IPA built at: $RUNNER_TEMP/ipa/anidaku.ipa"

      # ── 9. Upload IPA artifact ─────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: anidaku-unsigned-ipa
          path: ${{ runner.temp }}/ipa/anidaku.ipa
          retention-days: 7
