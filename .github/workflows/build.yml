name: 🎮 Build & Launch Production App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 🏁 Starting the run...
      uses: actions/checkout@v4

    - name: ☕ Brewing Java 17...
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: 🔓 Unlocking the Gradle wrapper...
      run: chmod +x gradlew

    - name: 🔨 Forging the APK...
      run: ./gradlew assembleRelease

    - name: 📦 Stashing the APK...
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk

    - name: 🏗️ Bundling the AAB...
      run: ./gradlew bundleRelease

    - name: 🎒 Stashing the AAB...
      uses: actions/upload-artifact@v4
      with:
        name: app-bundle
        path: app/build/outputs/bundle/release/*.aab

    - name: 🏷️ Tagging the release...
      id: tag
      run: |
        TAG="v1.0.$(date +'%Y%m%d%H%M%S')"
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag $TAG
        git push origin $TAG

    - name: 🚀 Launching to GitHub Releases!
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: "🎉 Release ${{ steps.tag.outputs.tag }}"
        body: |
          ## 🎮 A new build has dropped!
          
          🔥 Pushed by **${{ github.actor }}**
          📝 Commit: `${{ github.sha }}`
          🕒 Built at: `${{ github.event.head_commit.timestamp }}`
          
          ### 📦 What's inside:
          - 📱 APK — install directly on your device
          - 📦 AAB — ready for Play Store upload
          
          > 🏆 GG! Another successful build!
        files: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/bundle/release/*.aab
        draft: false
        prerelease: false
