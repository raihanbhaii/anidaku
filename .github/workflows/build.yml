name: 🎮 Build & Launch Production App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 🏁 Starting the run...
      uses: actions/checkout@v4

    - name: ☕ Brewing Java 17...
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: 🔓 Unlocking the Gradle wrapper...
      run: chmod +x gradlew

    - name: 🔑 Generating signing key...
      run: |
        keytool -genkey -v \
          -keystore app/release-key.jks \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -alias release \
          -storepass android \
          -keypass android \
          -dname "CN=App, OU=Dev, O=Company, L=City, ST=State, C=US"

    - name: 🔨 Forging the Signed APK...
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/release-key.jks \
          -Pandroid.injected.signing.store.password=android \
          -Pandroid.injected.signing.key.alias=release \
          -Pandroid.injected.signing.key.password=android

    - name: 📦 Stashing the APK...
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk

    - name: 🏷️ Tagging the release...
      id: tag
      run: |
        TAG="v1.0.$(date +'%Y%m%d%H%M%S')"
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag $TAG
        git push origin $TAG

    - name: 🚀 Launching to GitHub Releases!
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: "🎉 Release ${{ steps.tag.outputs.tag }}"
        body: |
          ## 🎮 A new build has dropped!
          
          🔥 Pushed by **${{ github.actor }}**
          📝 Commit: `${{ github.sha }}`
          🕒 Built at: `${{ github.event.head_commit.timestamp }}`
          
          ### 📦 What's inside:
          - 📱 Signed APK — install directly on your device
          
          > 🏆 GG! Another successful build!
        files: |
          app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
